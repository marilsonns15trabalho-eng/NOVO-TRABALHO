<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lioness Personal Estudio</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 36%),
          linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
        color: #ffffff;
        font-family: Arial, sans-serif;
      }

      .card {
        width: min(92vw, 420px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: rgba(15, 15, 15, 0.92);
        padding: 28px;
        box-shadow: 0 30px 100px -60px rgba(249, 115, 22, 0.45);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: #f97316;
        color: #000000;
        font-size: 28px;
        font-weight: 900;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">L</div>
      <h1>Lioness Personal Estudio</h1>
      <p>Inicializando o app.</p>
    </div>
  </body>
</html>
