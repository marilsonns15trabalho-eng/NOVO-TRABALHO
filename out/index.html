<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lioness Personal Estudio</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 36%),
          linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
        color: #ffffff;
        padding: 20px;
      }

      .card {
        width: min(100%, 460px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        background: rgba(15, 15, 15, 0.94);
        padding: 28px;
        box-shadow: 0 30px 100px -60px rgba(249, 115, 22, 0.45);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
        border-radius: 20px;
        background: #f97316;
        color: #000000;
        font-size: 30px;
        font-weight: 900;
      }

      .eyebrow {
        margin: 18px 0 0;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #fdba74;
      }

      h1 {
        margin: 10px 0 0;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 14px 0 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.65;
      }

      .status {
        margin-top: 18px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(249, 115, 22, 0.2);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #fdba74;
        background: rgba(249, 115, 22, 0.08);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f97316;
        box-shadow: 0 0 0 10px rgba(249, 115, 22, 0.14);
        animation: pulse 1.4s infinite ease-in-out;
      }

      .actions {
        margin-top: 24px;
        display: grid;
        gap: 12px;
      }

      button,
      a {
        appearance: none;
        border: 0;
        text-decoration: none;
        text-align: center;
        border-radius: 18px;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: #f97316;
        color: #000000;
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.02);
        color: #ffffff;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">L</div>
      <p class="eyebrow">Aplicativo Android</p>
      <h1>Lioness Personal Estudio</h1>
      <p>
        O aplicativo esta iniciando e tentando se conectar ao sistema publicado.
        Se a tela principal nao carregar agora, tente novamente abaixo.
      </p>
      <div class="status">
        <span class="dot"></span>
        Conectando ao sistema
      </div>
      <div class="actions">
        <button class="primary" type="button" onclick="window.location.reload()">
          Tentar novamente
        </button>
      </div>
    </div>
  </body>
</html>
