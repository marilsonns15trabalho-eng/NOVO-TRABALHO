// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

def externalBuildRoot = new File(
    System.getenv("LIONESS_ANDROID_BUILD_DIR")
        ?: new File(System.getProperty("java.io.tmpdir"), "lioness-android-build").absolutePath
)

rootProject.buildDir = new File(externalBuildRoot, "root")

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects {
    project.buildDir = new File(externalBuildRoot, project.name)
}

task clean(type: Delete) {
    delete externalBuildRoot
}
